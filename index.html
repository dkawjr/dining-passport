<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Jasmine & Adrian's Dining Passport — NYC Restaurant Week 2026</title>
  <meta name="description" content="A full-screen passport you flip through: spin a 3D globe, browse NYC Restaurant Week restaurants, match your picks, and collect a stamp for every country.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🛂%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  } }
  </script>
</head>
<body class="passport-app">
  <div class="ambient"></div>

  <header class="topbar">
    <div class="brand"><span class="seal">🌐</span> The Dining Passport</div>
    <div class="tb-actions">
      <span class="sync-badge" id="syncBadge"><span class="dot"></span>Share-link</span>
      <button class="ghost" id="themeBtn">☾ Night</button>
      <button class="ghost" id="shareBtn">💌 Share</button>
    </div>
  </header>

  <main class="stage"><div id="book"></div></main>

  <nav class="desk" aria-label="Passport controls">
    <div class="chapters">
      <button class="chapter-btn" data-chapter="intro">Cover</button>
      <button class="chapter-btn" data-chapter="world">World</button>
      <button class="chapter-btn" data-chapter="eat">Eat</button>
      <button class="chapter-btn" data-chapter="stamps">Passport</button>
      <button class="chapter-btn" data-chapter="trip">Trip</button>
    </div>
    <div class="filters">
      <div class="search">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.6"/><path d="M11 11l3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <input id="q" type="search" placeholder="Search…" aria-label="Search restaurants">
      </div>
      <select id="fCuisine" aria-label="Cuisine"></select>
      <select id="fBorough" aria-label="Borough"></select>
      <select id="fPrice" aria-label="Price"></select>
      <select id="fWho" aria-label="Who">
        <option value="">Everyone</option>
        <option value="match">★ Matches</option>
        <option value="j">Jasmine's ♥</option>
        <option value="a">Adrian's ♥</option>
        <option value="unpicked">Not picked</option>
      </select>
      <select id="sort" aria-label="Sort">
        <option value="rating">Top rated</option>
        <option value="reviews">Most reviewed</option>
        <option value="name">A–Z</option>
        <option value="cuisine">Cuisine</option>
      </select>
    </div>
    <div class="pageind" id="pageind">1 / 1</div>
  </nav>

  <div id="detail" hidden></div>
  <div id="toast"></div>

  <script src="config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
